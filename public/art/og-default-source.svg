<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2b7bff"/>
      <stop offset="0.5" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#aef000"/>
    </linearGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbe4fb"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b6bff" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#5b4bff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#5b4bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.42" r="0.85">
      <stop offset="0" stop-color="#0b1224" stop-opacity="0"/>
      <stop offset="1" stop-color="#03060d" stop-opacity="0.92"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#070b15"/>
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="2" fill="none">
    <circle cx="600" cy="315" r="150"/>
    <line x1="600" y1="60" x2="600" y2="570"/>
  </g>
  <ellipse cx="320" cy="315" rx="380" ry="320" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Trophy emblem (original geometry — not the FIFA mark) -->
  <g transform="translate(300 300) scale(8.6)">
    <g transform="translate(-24 -24)">
      <g fill="none" stroke="#ffffff" stroke-width="2.1" stroke-linecap="round">
        <path d="M16.6 14.2 C11.4 14.2 11.4 21.2 16.9 20.5"/>
        <path d="M31.4 14.2 C36.6 14.2 36.6 21.2 31.1 20.5"/>
      </g>
      <g fill="url(#cup)">
        <path d="M16.3 12.2 H31.7 V15.6 C31.7 22.2 28.3 26.2 24 26.2 C19.7 26.2 16.3 22.2 16.3 15.6 Z"/>
        <rect x="22.6" y="25.6" width="2.8" height="4.8" rx="0.6"/>
        <path d="M18.5 31 H29.5 L31 35 H17 Z"/>
        <rect x="16.2" y="35.4" width="15.6" height="2.6" rx="1.1"/>
      </g>
      <path d="M19.8 14.3 C19.8 19 21.3 22 23 22.9" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Text (centered → robust against RTL anchor quirks in the rasterizer) -->
  <g text-anchor="middle" font-family="'Segoe UI', Tahoma, Arial, sans-serif">
    <text x="800" y="215" font-size="40" font-weight="700" letter-spacing="6" fill="#aef000">GAMEPREDICT</text>
    <text x="800" y="330" font-size="92" font-weight="800" fill="#ffffff" direction="rtl">توقعات المباريات</text>
    <text x="800" y="410" font-size="42" font-weight="600" fill="#cdd7ee" direction="rtl">نافس أصحابك في مجموعات خاصة</text>
  </g>

  <rect x="0" y="620" width="1200" height="10" fill="url(#brand)"/>
</svg>
